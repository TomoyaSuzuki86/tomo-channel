# App Hosting backend settings for the dynamic deployment path.
# Firebase Hosting keeps using static export; this file is for App Hosting only.

runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  vpcAccess:
    connector: projects/tomo-channel-app/locations/asia-east1/connectors/tomo-channel-connector
    egress: PRIVATE_RANGES_ONLY

env:
  - variable: APP_HOSTING
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  - variable: DATABASE_URL
    secret: cloudsql_database_url
    availability:
      - RUNTIME

  - variable: JOB_PROCESS_SECRET
    secret: job_process_secret
    availability:
      - RUNTIME

  - variable: ADMIN_API_SECRET
    secret: admin_api_secret
    availability:
      - RUNTIME

  - variable: AI_REPLY_PROVIDER
    value: "openai"
    availability:
      - BUILD
      - RUNTIME

  - variable: OPENAI_API_KEY
    secret: openai_api_key
    availability:
      - RUNTIME

  - variable: OPENAI_MODEL
    value: "gpt-5.4-mini"
    availability:
      - BUILD
      - RUNTIME
